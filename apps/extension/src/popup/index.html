<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TeamOS Popup</title>
    <style>
      body {
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 16px;
        margin: 0;
        background-color: #0f172a;
        color: #f8fafc;
      }
      h3 {
        margin-top: 0;
        color: #38bdf8;
      }
      p {
        font-size: 14px;
        color: #94a3b8;
      }
      button {
        width: 100%;
        background-color: #0284c7;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0369a1;
      }
    </style>
  </head>
  <body>
    <h3>TeamOS</h3>
    <p>AI-powered browser extension for teams.</p>
    <button id="open-sidepanel">Open Side Panel</button>
    <script src="index.js"></script>
  </body>
</html>
