name: Production Deployment

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e apps/backend
          pip install pytest httpx
      - name: Run backend tests
        run: pytest apps/backend/tests/

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: apps/backend
          push: true
          tags: teamos/backend:latest, teamos/backend:${{ github.sha }}
          
      - name: Build and push Dashboard
        uses: docker/build-push-action@v4
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: teamos/dashboard:latest, teamos/dashboard:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger infrastructure update
        run: |
          echo "Triggering deployment webhook..."
          # Deploy step logic e.g., SSH to server, pull images, docker-compose up -d
